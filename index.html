<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godoy Liria Diaz — Gestión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#EDE9DF;min-height:100vh;padding:1rem}
.app{max-width:860px;margin:0 auto;background:#FAF8F2;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.10);overflow:hidden}
.header{display:flex;align-items:center;gap:14px;padding:14px 20px 12px;border-bottom:1px solid rgba(180,134,42,0.25);background:rgba(255,255,250,0.6)}
.header-icon{width:48px;height:48px;background:#2C2C2A;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#B4862A;font-size:22px;flex-shrink:0}
.header-title{font-size:14px;font-weight:700;color:#2C2C2A;letter-spacing:.06em;text-transform:uppercase}
.header-sub{font-size:11px;color:#999;margin-top:2px}
.tabs{display:flex;border-bottom:1px solid rgba(180,134,42,0.18);padding:0 20px}
.tab{padding:9px 16px;font-size:13px;font-weight:500;border:none;background:none;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#2C2C2A;border-bottom-color:#B4862A}
.section{display:none}.section.active{display:block}
.inner{padding:1.2rem 1.25rem}
.topbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.topbar input,.topbar select{font-size:13px;padding:7px 10px;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;background:rgba(255,255,255,0.8);color:#2C2C2A;min-width:0}
.topbar input{flex:1}
.btn{font-size:13px;padding:7px 14px;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;background:rgba(255,255,255,0.8);color:#2C2C2A;cursor:pointer;white-space:nowrap}
.btn:hover{background:#fff}
.btn.pri{background:#2C2C2A;color:#F5F3ED;border-color:transparent}
.btn.pri:hover{background:#444}
.btn.red{color:#A32D2D;border-color:rgba(163,45,45,0.2)}
.card{background:rgba(255,255,255,0.68);border:0.5px solid rgba(180,134,42,0.18);border-radius:10px;padding:1rem 1.25rem;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ct{font-size:14px;font-weight:500;color:#2C2C2A}
.cs{font-size:12px;color:#999;margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.meta span{font-size:12px;color:#777}
.acts{display:flex;gap:6px;margin-top:10px}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-block}
.b-civil{background:#E6F1FB;color:#0C447C}
.b-laboral{background:#EAF3DE;color:#27500A}
.b-familia{background:#FAEEDA;color:#633806}
.b-comercial{background:#EEEDFE;color:#3C3489}
.b-inmobiliario{background:#E1F5EE;color:#085041}
.b-otro{background:#F1EFE8;color:#444}
.b-pendiente{background:#FAEEDA;color:#633806}
.b-en-curso{background:#E6F1FB;color:#0C447C}
.b-completado{background:#EAF3DE;color:#27500A}
.b-urgente{background:#FCEBEB;color:#791F1F}
.empty{text-align:center;padding:2.5rem;color:#bbb;font-size:13px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.4rem}
.stat{background:rgba(255,252,245,0.9);border:0.5px solid rgba(180,134,42,0.2);border-radius:10px;padding:1rem;text-align:center}
.stat-n{font-size:24px;font-weight:600;color:#2C2C2A}
.stat-l{font-size:11px;color:#999;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.divider{font-size:11px;font-weight:600;color:#B4862A;letter-spacing:.08em;text-transform:uppercase;margin:1.2rem 0 .6rem;padding-bottom:5px;border-bottom:1px solid rgba(180,134,42,0.22)}
.overlay{display:none;position:fixed;inset:0;background:rgba(44,44,42,.5);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#FDFCF8;border:0.5px solid rgba(180,134,42,0.25);border-radius:12px;padding:1.5rem;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,0.18);margin:auto}
.modal h3{font-size:15px;font-weight:600;color:#2C2C2A;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid rgba(180,134,42,0.15)}
.f{margin-bottom:10px}
.f label{display:block;font-size:11px;font-weight:600;color:#999;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.f input,.f select,.f textarea{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.14);border-radius:8px;background:rgba(255,255,255,0.9);color:#2C2C2A}
.f textarea{resize:vertical;min-height:64px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:.8rem;border-top:1px solid rgba(180,134,42,0.12)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">⚖</div>
    <div>
      <div class="header-title">Godoy Liria Diaz</div>
      <div class="header-sub">Estudio Jurídico — Sistema de gestión</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="goTab('dashboard')">Resumen</button>
    <button class="tab" onclick="goTab('clientes')">Clientes</button>
    <button class="tab" onclick="goTab('actividades')">Actividades</button>
    <button class="tab" onclick="goTab('vencimientos')">Vencimientos</button>
  </div>
  <div id="s-dashboard" class="section active"><div class="inner">
    <div class="stats" id="stats-grid"></div>
    <div class="divider">Próximos vencimientos</div>
    <div id="d-venc"></div>
    <div class="divider">Pendientes recientes</div>
    <div id="d-pend"></div>
  </div></div>
  <div id="s-clientes" class="section"><div class="inner">
    <div class="topbar">
      <input type="text" id="q-cliente" placeholder="Buscar por nombre o expediente..." oninput="renderClientes()">
      <select id="q-area" onchange="renderClientes()">
        <option value="">Todas las áreas</option>
        <option value="civil">Civil</option><option value="laboral">Laboral</option>
        <option value="familia">Familia</option><option value="comercial">Comercial</option>
        <option value="inmobiliario">Inmobiliario</option><option value="otro">Otro</option>
      </select>
      <button class="btn pri" onclick="abrirCliente(-1)">+ Nuevo cliente</button>
    </div>
    <div id="lista-clientes"></div>
  </div></div>
  <div id="s-actividades" class="section"><div class="inner">
    <div class="topbar">
      <select id="q-tipo" onchange="renderActividades()">
        <option value="">Todos los tipos</option>
        <option value="escrito">Escrito / presentación</option><option value="audiencia">Audiencia</option>
        <option value="consulta">Consulta / reunión</option><option value="honorario">Honorario / cobro</option>
        <option value="otro">Otro</option>
      </select>
      <select id="q-est" onchange="renderActividades()">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendiente</option><option value="en-curso">En curso</option><option value="completado">Completado</option>
      </select>
      <select id="q-abog" onchange="renderActividades()">
        <option value="">Ambos</option><option value="Federico">Federico</option><option value="Gisella">Gisella</option>
      </select>
      <button class="btn pri" onclick="abrirActividad()">+ Nueva actividad</button>
    </div>
    <div id="lista-actividades"></div>
  </div></div>
  <div id="s-vencimientos" class="section"><div class="inner">
    <div class="topbar">
      <select id="q-dias" onchange="renderVencimientos()">
        <option value="7">Próximos 7 días</option><option value="15">Próximos 15 días</option>
        <option value="30" selected>Próximos 30 días</option><option value="90">Próximos 3 meses</option>
        <option value="0">Todos</option>
      </select>
    </div>
    <div id="lista-venc"></div>
  </div></div>
</div>

<!-- MODAL CLIENTE -->
<div class="overlay" id="ov-cliente">
  <div class="modal">
    <h3 id="mc-h">Nuevo cliente</h3>
    <div class="f"><label>Nombre *</label><input type="text" id="mc-nombre"></div>
    <div class="f"><label>DNI / CUIT</label><input type="text" id="mc-dni"></div>
    <div class="f"><label>Teléfono</label><input type="text" id="mc-tel"></div>
    <div class="f"><label>Email</label><input type="text" id="mc-email"></div>
    <div class="f"><label>Área</label>
      <select id="mc-area"><option value="civil">Civil</option><option value="laboral">Laboral</option><option value="familia">Familia</option><option value="comercial">Comercial</option><option value="inmobiliario">Inmobiliario</option><option value="otro">Otro</option></select>
    </div>
    <div class="f"><label>N° de expediente</label><input type="text" id="mc-expte"></div>
    <div class="f"><label>Objeto del proceso</label><textarea id="mc-desc"></textarea></div>
    <div class="f"><label>A cargo de</label>
      <select id="mc-abog"><option value="Federico">Federico</option><option value="Gisella">Gisella</option><option value="Ambos">Ambos</option></select>
    </div>
    <div class="mf">
      <button class="btn" onclick="cerrarOv('ov-cliente')">Cancelar</button>
      <button class="btn pri" onclick="guardarCliente()">Guardar cliente</button>
    </div>
  </div>
</div>

<!-- MODAL ACTIVIDAD -->
<div class="overlay" id="ov-actividad">
  <div class="modal">
    <h3>Nueva actividad</h3>
    <div class="f"><label>Cliente *</label><select id="ma-cli"></select></div>
    <div class="f"><label>Tipo</label>
      <select id="ma-tipo"><option value="escrito">Escrito / presentación</option><option value="audiencia">Audiencia</option><option value="consulta">Consulta / reunión</option><option value="honorario">Honorario / cobro</option><option value="otro">Otro</option></select>
    </div>
    <div class="f"><label>Descripción *</label><textarea id="ma-desc"></textarea></div>
    <div class="f"><label>Fecha</label><input type="date" id="ma-fecha"></div>
    <div class="f"><label>Estado</label>
      <select id="ma-est"><option value="pendiente">Pendiente</option><option value="en-curso">En curso</option><option value="completado">Completado</option></select>
    </div>
    <div class="f"><label>¿Es urgente?</label>
      <select id="ma-urg"><option value="no">No</option><option value="si">Sí</option></select>
    </div>
    <div class="f"><label>Responsable</label>
      <select id="ma-abog"><option value="Federico">Federico</option><option value="Gisella">Gisella</option><option value="Ambos">Ambos</option></select>
    </div>
    <div class="f"><label>Monto honorario ($)</label><input type="number" id="ma-monto" placeholder="0"></div>
    <div class="f"><label>Notas</label><textarea id="ma-notas"></textarea></div>
    <div class="mf">
      <button class="btn" onclick="cerrarOv('ov-actividad')">Cancelar</button>
      <button class="btn pri" onclick="guardarActividad()">Guardar actividad</button>
    </div>
  </div>
</div>

<script>
var clientes = [];
var actividades = [];
var editIdx = -1;
var TL = {escrito:'Escrito / presentación',audiencia:'Audiencia',consulta:'Consulta / reunión',honorario:'Honorario / cobro',otro:'Otro'};

function hoy() { return new Date().toISOString().slice(0,10); }
function fmt(d) { if(!d) return '—'; var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function diasA(f) { var h=new Date(); h.setHours(0,0,0,0); return Math.round((new Date(f+'T00:00:00')-h)/86400000); }
function cap(s) { return s.charAt(0).toUpperCase()+s.slice(1).replace('-',' '); }

function goTab(t) {
  var tabs = ['dashboard','clientes','actividades','vencimientos'];
  document.querySelectorAll('.tab').forEach(function(el,i) { el.classList.toggle('active', tabs[i]===t); });
  document.querySelectorAll('.section').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('s-'+t).classList.add('active');
  if(t==='dashboard') renderDash();
  if(t==='clientes') renderClientes();
  if(t==='actividades') renderActividades();
  if(t==='vencimientos') renderVencimientos();
}

function cerrarOv(id) { document.getElementById(id).classList.remove('open'); editIdx=-1; }

function abrirCliente(idx) {
  editIdx = idx;
  var c = idx>=0 ? clientes[idx] : {};
  document.getElementById('mc-h').textContent = idx>=0 ? 'Editar cliente' : 'Nuevo cliente';
  ['nombre','dni','tel','email','expte','desc'].forEach(function(k) { document.getElementById('mc-'+k).value = c[k]||''; });
  document.getElementById('mc-area').value = c.area||'civil';
  document.getElementById('mc-abog').value = c.abog||'Federico';
  document.getElementById('ov-cliente').classList.add('open');
  setTimeout(function() { document.getElementById('mc-nombre').focus(); }, 80);
}

function guardarCliente() {
  var nombre = document.getElementById('mc-nombre').value.trim();
  if (!nombre) { alert('Ingresá el nombre del cliente.'); return; }
  var obj = {
    nombre: nombre,
    dni: document.getElementById('mc-dni').value.trim(),
    tel: document.getElementById('mc-tel').value.trim(),
    email: document.getElementById('mc-email').value.trim(),
    area: document.getElementById('mc-area').value,
    expte: document.getElementById('mc-expte').value.trim(),
    desc: document.getElementById('mc-desc').value.trim(),
    abog: document.getElementById('mc-abog').value
  };
  if (editIdx>=0) clientes[editIdx]=obj; else clientes.push(obj);
  cerrarOv('ov-cliente'); renderClientes(); renderDash();
}

function eliminarCliente(i) {
  if (!confirm('¿Eliminar a "'+clientes[i].nombre+'"?')) return;
  actividades = actividades.filter(function(a) { return a.ci!==i; }).map(function(a) { return Object.assign({},a,{ci:a.ci>i?a.ci-1:a.ci}); });
  clientes.splice(i,1); renderClientes(); renderDash();
}

function renderClientes() {
  var q=(document.getElementById('q-cliente').value||'').toLowerCase();
  var area=document.getElementById('q-area').value;
  var el=document.getElementById('lista-clientes');
  var lista=clientes.map(function(c,i) { return Object.assign({},c,{i:i}); }).filter(function(c) {
    return (!area||c.area===area)&&(!q||c.nombre.toLowerCase().includes(q)||(c.expte||'').toLowerCase().includes(q));
  });
  if (!lista.length) { el.innerHTML='<div class="empty">No hay clientes. Usá "+ Nuevo cliente".</div>'; return; }
  el.innerHTML=lista.map(function(c) {
    return '<div class="card"><div class="ch"><div>'
      +'<div class="ct">'+c.nombre+'</div>'
      +'<div class="cs">'+(c.expte?'Expte. '+c.expte+' &middot; ':'')+'<span class="badge b-'+c.area+'">'+cap(c.area)+'</span></div>'
      +'</div><div style="display:flex;gap:6px;flex-shrink:0">'
      +'<button class="btn" onclick="abrirCliente('+c.i+')">Editar</button>'
      +'<button class="btn red" onclick="eliminarCliente('+c.i+')">Eliminar</button>'
      +'</div></div>'
      +'<div class="meta">'+(c.tel?'<span>Tel: '+c.tel+'</span>':'')+(c.email?'<span>Email: '+c.email+'</span>':'')+'<span>A cargo: '+c.abog+'</span></div>'
      +(c.desc?'<div style="margin-top:8px;font-size:12px;color:#888;font-style:italic">'+c.desc+'</div>':'')
      +'<div class="acts"><button class="btn" onclick="goTab(\'actividades\');setTimeout(function(){abrirActividad('+c.i+')},80)">+ Actividad</button></div>'
      +'</div>';
  }).join('');
}

function abrirActividad(ci) {
  var sel=document.getElementById('ma-cli');
  sel.innerHTML=clientes.length
    ? clientes.map(function(c,i) { return '<option value="'+i+'">'+c.nombre+'</option>'; }).join('')
    : '<option value="">— Sin clientes —</option>';
  if (ci!==undefined) sel.value=ci;
  document.getElementById('ma-fecha').value=hoy();
  document.getElementById('ma-desc').value='';
  document.getElementById('ma-monto').value='';
  document.getElementById('ma-notas').value='';
  document.getElementById('ma-est').value='pendiente';
  document.getElementById('ma-urg').value='no';
  document.getElementById('ov-actividad').classList.add('open');
}

function guardarActividad() {
  var desc=document.getElementById('ma-desc').value.trim();
  if (!desc) { alert('Ingresá una descripción.'); return; }
  if (!clientes.length) { alert('Primero cargá un cliente.'); return; }
  actividades.push({
    ci: parseInt(document.getElementById('ma-cli').value)||0,
    tipo: document.getElementById('ma-tipo').value,
    desc: desc,
    fecha: document.getElementById('ma-fecha').value,
    est: document.getElementById('ma-est').value,
    urg: document.getElementById('ma-urg').value==='si',
    abog: document.getElementById('ma-abog').value,
    monto: document.getElementById('ma-monto').value,
    notas: document.getElementById('ma-notas').value.trim()
  });
  cerrarOv('ov-actividad'); renderActividades(); renderDash();
}

function avanzarEstado(i) {
  var orden=['pendiente','en-curso','completado'];
  actividades[i].est=orden[(orden.indexOf(actividades[i].est)+1)%3];
  renderActividades(); renderDash();
}

function eliminarActividad(i) {
  if (!confirm('¿Eliminar esta actividad?')) return;
  actividades.splice(i,1); renderActividades(); renderDash();
}

function renderActividades() {
  var tipo=document.getElementById('q-tipo').value, est=document.getElementById('q-est').value, abog=document.getElementById('q-abog').value;
  var el=document.getElementById('lista-actividades');
  var lista=actividades.map(function(a,i) { return Object.assign({},a,{i:i}); }).filter(function(a) {
    return (!tipo||a.tipo===tipo)&&(!est||a.est===est)&&(!abog||a.abog===abog);
  }).sort(function(a,b) { return (a.fecha||'')>(b.fecha||'')?1:-1; });
  if (!lista.length) { el.innerHTML='<div class="empty">No hay actividades aún.</div>'; return; }
  el.innerHTML=lista.map(function(a) {
    var cn=clientes[a.ci]?clientes[a.ci].nombre:'—';
    return '<div class="card"><div class="ch"><div>'
      +'<div class="ct">'+a.desc+'</div>'
      +'<div class="cs"><span class="badge b-'+a.est+'">'+cap(a.est)+'</span>'+(a.urg?'<span class="badge b-urgente">Urgente</span>':'')+'<span style="color:#ccc">'+(TL[a.tipo]||a.tipo)+'</span></div>'
      +'</div><div style="display:flex;gap:6px;flex-shrink:0">'
      +'<button class="btn" onclick="avanzarEstado('+a.i+')" title="Avanzar estado">→</button>'
      +'<button class="btn red" onclick="eliminarActividad('+a.i+')">✕</button>'
      +'</div></div>'
      +'<div class="meta"><span>'+cn+'</span><span>'+fmt(a.fecha)+'</span><span>'+a.abog+'</span>'+(a.monto?'<span>$'+Number(a.monto).toLocaleString('es-AR')+'</span>':'')+'</div>'
      +(a.notas?'<div style="margin-top:6px;font-size:12px;color:#888;font-style:italic">'+a.notas+'</div>':'')
      +'</div>';
  }).join('');
}

function renderVencimientos() {
  var d=parseInt(document.getElementById('q-dias').value), el=document.getElementById('lista-venc');
  var lista=actividades.filter(function(a) { return a.fecha&&a.est!=='completado'; });
  if (d>0) lista=lista.filter(function(a) { var x=diasA(a.fecha); return x>=-3&&x<=d; });
  lista.sort(function(a,b) { return a.fecha>b.fecha?1:-1; });
  if (!lista.length) { el.innerHTML='<div class="empty">No hay vencimientos en este período.</div>'; return; }
  el.innerHTML=lista.map(function(a) {
    var dr=diasA(a.fecha), cn=clientes[a.ci]?clientes[a.ci].nombre:'—', alerta, col;
    if(dr<0){ col='#A32D2D'; alerta='Vencido hace '+Math.abs(dr)+' día'+(Math.abs(dr)!==1?'s':''); }
    else if(dr===0){ col='#A32D2D'; alerta='Vence HOY'; }
    else if(dr<=3){ col='#854F0B'; alerta='En '+dr+' día'+(dr!==1?'s':''); }
    else{ col='#777'; alerta=fmt(a.fecha); }
    return '<div class="card"><div class="ch">'
      +'<div><div class="ct">'+a.desc+'</div><div class="cs">'+cn+' &middot; '+(TL[a.tipo]||a.tipo)+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0"><span style="font-size:12px;font-weight:600;color:'+col+'">'+alerta+'</span><br><span class="badge b-'+a.est+'" style="margin-top:4px">'+cap(a.est)+'</span></div>'
      +'</div><div class="meta"><span>'+a.abog+'</span></div></div>';
  }).join('');
}

function renderDash() {
  var pend=actividades.filter(function(a) { return a.est==='pendiente'; }).length;
  var v7=actividades.filter(function(a) { return a.fecha&&a.est!=='completado'&&diasA(a.fecha)>=0&&diasA(a.fecha)<=7; }).length;
  var hon=actividades.filter(function(a) { return a.tipo==='honorario'&&a.monto; }).reduce(function(s,a) { return s+Number(a.monto); },0);
  document.getElementById('stats-grid').innerHTML=
    '<div class="stat"><div class="stat-n">'+clientes.length+'</div><div class="stat-l">Clientes</div></div>'
    +'<div class="stat"><div class="stat-n">'+pend+'</div><div class="stat-l">Pendientes</div></div>'
    +'<div class="stat"><div class="stat-n">'+v7+'</div><div class="stat-l">Vencen en 7 días</div></div>'
    +'<div class="stat"><div class="stat-n">$'+Math.round(hon).toLocaleString('es-AR')+'</div><div class="stat-l">Honorarios</div></div>';
  var pV=actividades.filter(function(a) { return a.fecha&&a.est!=='completado'; }).sort(function(a,b) { return a.fecha>b.fecha?1:-1; }).slice(0,3);
  document.getElementById('d-venc').innerHTML=pV.length?pV.map(function(a) {
    var dr=diasA(a.fecha), cn=clientes[a.ci]?clientes[a.ci].nombre:'—', col=dr<=0?'#A32D2D':dr<=3?'#854F0B':'#777';
    return '<div class="card" style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div class="ct" style="font-size:13px">'+a.desc+'</div><div class="cs">'+cn+'</div></div>'
      +'<span style="font-size:12px;font-weight:600;color:'+col+';flex-shrink:0">'+fmt(a.fecha)+'</span></div>';
  }).join(''):'<div class="empty">Sin vencimientos próximos.</div>';
  var pL=actividades.filter(function(a) { return a.est==='pendiente'; }).slice(0,3);
  document.getElementById('d-pend').innerHTML=pL.length?pL.map(function(a) {
    var cn=clientes[a.ci]?clientes[a.ci].nombre:'—';
    return '<div class="card" style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div class="ct" style="font-size:13px">'+a.desc+'</div><div class="cs">'+cn+' &middot; '+a.abog+'</div></div>'
      +(a.urg?'<span class="badge b-urgente">Urgente</span>':'')+'</div>';
  }).join(''):'<div class="empty">No hay pendientes.</div>';
}

renderDash();
renderClientes();
</script>
</body>
</html>
