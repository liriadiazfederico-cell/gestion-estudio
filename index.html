<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godoy Liria Diaz — Gestión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#EDE9DF;min-height:100vh;padding:1rem}
.app{max-width:900px;margin:0 auto;background:#FAF8F2;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.10);overflow:hidden}
.header{display:flex;align-items:center;gap:14px;padding:14px 20px 12px;border-bottom:1px solid rgba(180,134,42,0.25);background:rgba(255,255,250,0.6)}
.header-icon{width:48px;height:48px;background:#2C2C2A;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#B4862A;font-size:22px;flex-shrink:0}
.header-title{font-size:14px;font-weight:700;color:#2C2C2A;letter-spacing:.06em;text-transform:uppercase}
.header-sub{font-size:11px;color:#999;margin-top:2px}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sync-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.sync-ok{background:#EAF3DE;color:#27500A}
.sync-err{background:#FCEBEB;color:#791F1F}
.sync-loading{background:#FAEEDA;color:#633806}
.tabs{display:flex;border-bottom:1px solid rgba(180,134,42,0.18);padding:0 20px;overflow-x:auto}
.tab{padding:9px 14px;font-size:13px;font-weight:500;border:none;background:none;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.active{color:#2C2C2A;border-bottom-color:#B4862A}
.section{display:none}.section.active{display:block}
.inner{padding:1.2rem 1.25rem}
.topbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.topbar input,.topbar select{font-size:13px;padding:7px 10px;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;background:rgba(255,255,255,0.8);color:#2C2C2A;min-width:0}
.topbar input{flex:1}
.btn{font-size:13px;padding:7px 14px;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;background:rgba(255,255,255,0.8);color:#2C2C2A;cursor:pointer;white-space:nowrap}
.btn:hover{background:#fff}
.btn.pri{background:#2C2C2A;color:#F5F3ED;border-color:transparent}
.btn.pri:hover{background:#444}
.btn.red{color:#A32D2D;border-color:rgba(163,45,45,0.2)}
.btn.gold{background:#B4862A;color:#fff;border-color:transparent;font-size:12px;padding:6px 12px}
.btn.gold:hover{background:#9a7023}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:rgba(255,255,255,0.68);border:0.5px solid rgba(180,134,42,0.18);border-radius:10px;padding:1rem 1.25rem;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ct{font-size:14px;font-weight:500;color:#2C2C2A}
.cs{font-size:12px;color:#999;margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.meta span{font-size:12px;color:#777}
.acts{display:flex;gap:6px;margin-top:10px}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-block}
.b-civil{background:#E6F1FB;color:#0C447C}
.b-laboral{background:#EAF3DE;color:#27500A}
.b-familia{background:#FAEEDA;color:#633806}
.b-comercial{background:#EEEDFE;color:#3C3489}
.b-inmobiliario{background:#E1F5EE;color:#085041}
.b-otro{background:#F1EFE8;color:#444}
.b-pendiente{background:#FAEEDA;color:#633806}
.b-en-curso{background:#E6F1FB;color:#0C447C}
.b-completado{background:#EAF3DE;color:#27500A}
.b-urgente{background:#FCEBEB;color:#791F1F}
.b-activo{background:#EAF3DE;color:#27500A}
.b-finalizado{background:#E6F1FB;color:#0C447C}
.b-archivado{background:#F1EFE8;color:#444}
.empty{text-align:center;padding:2.5rem;color:#bbb;font-size:13px}
.loading-box{text-align:center;padding:2.5rem;color:#B4862A;font-size:13px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.4rem}
.stat{background:rgba(255,252,245,0.9);border:0.5px solid rgba(180,134,42,0.2);border-radius:10px;padding:1rem;text-align:center}
.stat-n{font-size:24px;font-weight:600;color:#2C2C2A}
.stat-l{font-size:11px;color:#999;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.divider{font-size:11px;font-weight:600;color:#B4862A;letter-spacing:.08em;text-transform:uppercase;margin:1.2rem 0 .6rem;padding-bottom:5px;border-bottom:1px solid rgba(180,134,42,0.22)}
.overlay{display:none;position:fixed;inset:0;background:rgba(44,44,42,.5);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#FDFCF8;border:0.5px solid rgba(180,134,42,0.25);border-radius:12px;padding:1.5rem;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,0.18);margin:auto}
.modal h3{font-size:15px;font-weight:600;color:#2C2C2A;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid rgba(180,134,42,0.15)}
.f{margin-bottom:10px}
.f label{display:block;font-size:11px;font-weight:600;color:#999;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.f input,.f select,.f textarea{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.14);border-radius:8px;background:rgba(255,255,255,0.9);color:#2C2C2A}
.f textarea{resize:vertical;min-height:64px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:.8rem;border-top:1px solid rgba(180,134,42,0.12)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#2C2C2A;color:#fff;font-size:12px;padding:10px 18px;border-radius:20px;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}
.expte-card{background:rgba(255,255,255,0.68);border:0.5px solid rgba(180,134,42,0.18);border-radius:10px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05);overflow:hidden}
.expte-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;cursor:pointer;gap:8px}
.expte-header:hover{background:rgba(255,255,255,0.5)}
.expte-num{font-size:13px;font-weight:700;color:#B4862A;letter-spacing:.04em}
.expte-nombre{font-size:14px;font-weight:500;color:#2C2C2A;margin-top:2px}
.expte-meta{font-size:12px;color:#999;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.expte-toggle{font-size:18px;color:#B4862A;flex-shrink:0;transition:transform .2s}
.expte-toggle.open{transform:rotate(90deg)}
.expte-body{display:none;border-top:1px solid rgba(180,134,42,0.12);padding:1rem 1.25rem}
.expte-body.open{display:block}
.timeline{position:relative;padding-left:1.5rem}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:rgba(180,134,42,0.2);border-radius:2px}
.tl-item{position:relative;margin-bottom:1rem}
.tl-dot{position:absolute;left:-1.5rem;top:3px;width:14px;height:14px;border-radius:50%;border:2px solid #B4862A;background:#FAF8F2}
.tl-dot.completado{background:#B4862A}
.tl-dot.pendiente{background:#F5EDD8}
.tl-dot.en-curso{background:#D6E8F7}
.tl-fecha{font-size:11px;color:#B4862A;font-weight:600;margin-bottom:2px}
.tl-desc{font-size:13px;color:#2C2C2A;font-weight:500}
.tl-meta{font-size:11px;color:#999;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.tl-notas{font-size:12px;color:#888;font-style:italic;margin-top:4px}
.expte-datos{background:rgba(255,252,245,0.6);border-radius:8px;padding:.8rem 1rem;margin-bottom:1rem;font-size:12px;color:#666;display:flex;gap:12px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">
  <div class="header">
    <div class="header-icon">⚖</div>
    <div>
      <div class="header-title">Godoy Liria Diaz</div>
      <div class="header-sub">Estudio Jurídico — Sistema de gestión</div>
    </div>
    <div class="header-right">
      <span class="sync-badge sync-loading" id="sync-badge">Conectando...</span>
      <button class="btn gold" onclick="cargarTodo()">↻ Actualizar</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="goTab('dashboard')">Resumen</button>
    <button class="tab" onclick="goTab('clientes')">Clientes</button>
    <button class="tab" onclick="goTab('expedientes')">Expedientes</button>
    <button class="tab" onclick="goTab('actividades')">Actividades</button>
    <button class="tab" onclick="goTab('vencimientos')">Vencimientos</button>
  </div>

  <div id="s-dashboard" class="section active"><div class="inner">
    <div class="stats" id="stats-grid"></div>
    <div class="divider">Próximos vencimientos</div>
    <div id="d-venc"></div>
    <div class="divider">Pendientes recientes</div>
    <div id="d-pend"></div>
  </div></div>

  <div id="s-clientes" class="section"><div class="inner">
    <div class="topbar">
      <input type="text" id="q-cliente" placeholder="Buscar por nombre o expediente..." oninput="renderClientes()">
      <select id="q-area" onchange="renderClientes()">
        <option value="">Todas las áreas</option>
        <option value="civil">Civil</option><option value="laboral">Laboral</option>
        <option value="familia">Familia</option><option value="comercial">Comercial</option>
        <option value="inmobiliario">Inmobiliario</option><option value="otro">Otro</option>
      </select>
      <select id="q-estado" onchange="renderClientes()">
        <option value="activo">Activos</option>
        <option value="">Todos</option>
        <option value="finalizado">Finalizados</option>
        <option value="archivado">Archivados</option>
      </select>
      <button class="btn pri" onclick="abrirCliente(-1)">+ Nuevo cliente</button>
    </div>
    <div id="lista-clientes"><div class="loading-box">Cargando...</div></div>
  </div></div>

  <div id="s-expedientes" class="section"><div class="inner">
    <div class="topbar">
      <input type="text" id="q-expte" placeholder="Buscar por expediente o cliente..." oninput="renderExpedientes()">
      <select id="q-estado-expte" onchange="renderExpedientes()">
        <option value="activo">Activos</option>
        <option value="">Todos</option>
        <option value="finalizado">Finalizados</option>
        <option value="archivado">Archivados</option>
      </select>
    </div>
    <div id="lista-expedientes"><div class="loading-box">Cargando...</div></div>
  </div></div>

  <div id="s-actividades" class="section"><div class="inner">
    <div class="topbar">
      <select id="q-tipo" onchange="renderActividades()">
        <option value="">Todos los tipos</option>
        <option value="escrito">Escrito / presentación</option><option value="audiencia">Audiencia</option>
        <option value="consulta">Consulta / reunión</option><option value="honorario">Honorario / cobro</option>
        <option value="otro">Otro</option>
      </select>
      <select id="q-est" onchange="renderActividades()">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendiente</option><option value="en-curso">En curso</option><option value="completado">Completado</option>
      </select>
      <select id="q-abog" onchange="renderActividades()">
        <option value="">Ambos</option><option value="Federico">Federico</option><option value="Gisella">Gisella</option>
      </select>
      <button class="btn pri" onclick="abrirActividad()">+ Nueva actividad</button>
    </div>
    <div id="lista-actividades"><div class="loading-box">Cargando...</div></div>
  </div></div>

  <div id="s-vencimientos" class="section"><div class="inner">
    <div class="topbar">
      <select id="q-dias" onchange="renderVencimientos()">
        <option value="7">Próximos 7 días</option><option value="15">Próximos 15 días</option>
        <option value="30" selected>Próximos 30 días</option><option value="90">Próximos 3 meses</option>
        <option value="0">Todos</option>
      </select>
    </div>
    <div id="lista-venc"></div>
  </div></div>
</div>

<!-- MODAL CLIENTE -->
<div class="overlay" id="ov-cliente">
  <div class="modal">
    <h3 id="mc-h">Nuevo cliente</h3>
    <div class="f"><label>ID Cliente</label><input type="text" id="mc-id" placeholder="Ej: CLI-001"></div>
    <div class="f"><label>Nombre *</label><input type="text" id="mc-nombre"></div>
    <div class="f"><label>DNI / CUIT</label><input type="text" id="mc-dni"></div>
    <div class="f"><label>Teléfono</label><input type="text" id="mc-tel"></div>
    <div class="f"><label>Email</label><input type="text" id="mc-email"></div>
    <div class="f"><label>Área</label>
      <select id="mc-area"><option value="civil">Civil</option><option value="laboral">Laboral</option><option value="familia">Familia</option><option value="comercial">Comercial</option><option value="inmobiliario">Inmobiliario</option><option value="otro">Otro</option></select>
    </div>
    <div class="f"><label>N° de expediente</label><input type="text" id="mc-expte"></div>
    <div class="f"><label>Objeto del proceso</label><textarea id="mc-desc"></textarea></div>
    <div class="f"><label>A cargo de</label>
      <select id="mc-abog"><option value="Federico">Federico</option><option value="Gisella">Gisella</option><option value="Ambos">Ambos</option></select>
    </div>
    <div class="f"><label>Estado del expediente</label>
      <select id="mc-estado"><option value="activo">Activo</option><option value="finalizado">Finalizado</option><option value="archivado">Archivado</option></select>
    </div>
    <div class="mf">
      <button class="btn" onclick="cerrarOv('ov-cliente')">Cancelar</button>
      <button class="btn pri" id="btn-gc" onclick="guardarCliente()">Guardar cliente</button>
    </div>
  </div>
</div>

<!-- MODAL ACTIVIDAD -->
<div class="overlay" id="ov-actividad">
  <div class="modal">
    <h3>Nueva actividad</h3>
    <div class="f"><label>Cliente *</label><select id="ma-cli"></select></div>
    <div class="f"><label>Tipo</label>
      <select id="ma-tipo"><option value="escrito">Escrito / presentación</option><option value="audiencia">Audiencia</option><option value="consulta">Consulta / reunión</option><option value="honorario">Honorario / cobro</option><option value="otro">Otro</option></select>
    </div>
    <div class="f"><label>Descripción *</label><textarea id="ma-desc"></textarea></div>
    <div class="f"><label>Fecha</label><input type="date" id="ma-fecha"></div>
    <div class="f"><label>Estado</label>
      <select id="ma-est"><option value="pendiente">Pendiente</option><option value="en-curso">En curso</option><option value="completado">Completado</option></select>
    </div>
    <div class="f"><label>¿Es urgente?</label>
      <select id="ma-urg"><option value="no">No</option><option value="si">Sí</option></select>
    </div>
    <div class="f"><label>Responsable</label>
      <select id="ma-abog"><option value="Federico">Federico</option><option value="Gisella">Gisella</option><option value="Ambos">Ambos</option></select>
    </div>
    <div class="f"><label>Monto honorario ($)</label><input type="number" id="ma-monto" placeholder="0"></div>
    <div class="f"><label>Notas</label><textarea id="ma-notas"></textarea></div>
    <div class="mf">
      <button class="btn" onclick="cerrarOv('ov-actividad')">Cancelar</button>
      <button class="btn pri" id="btn-ga" onclick="guardarActividad()">Guardar actividad</button>
    </div>
  </div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzXOGIR0gcyPZ3iz6LGdf23pUrVHhuc3fjXb5yUUpUKozIG3mjISA5mzb2EMh5UICn7/exec';
var clientes = [], actividades = [], editIdx = -1;
var TL = {escrito:'Escrito / presentación',audiencia:'Audiencia',consulta:'Consulta / reunión',honorario:'Honorario / cobro',otro:'Otro'};

function setSyncStatus(txt,cls){var el=document.getElementById('sync-badge');el.textContent=txt;el.className='sync-badge '+cls;}
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2500);}
function hoy(){return new Date().toISOString().slice(0,10);}
function fmt(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function diasA(f){var h=new Date();h.setHours(0,0,0,0);return Math.round((new Date(f+'T00:00:00')-h)/86400000);}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1).replace('-',' ');}

function api(params, cb) {
  var url = SCRIPT_URL + '?' + Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){cb(null,d);})
    .catch(function(e){cb(e,null);});
}

function cargarTodo(cb) {
  setSyncStatus('Sincronizando...','sync-loading');
  api({action:'getAll',sheet:'Clientes'}, function(err,dc) {
    if(err){setSyncStatus('Sin conexión','sync-err');if(cb)cb(err);return;}
    clientes=(dc.data||[]).filter(function(r){return r[1];}).map(function(r,i){
      return {rowIndex:i+2,id:r[0]||'',nombre:r[1]||'',dni:r[2]||'',tel:r[3]||'',email:r[4]||'',area:r[5]||'civil',expte:r[6]||'',desc:r[7]||'',abog:r[8]||'Federico',estado:r[9]||'activo'};
    });
    api({action:'getAll',sheet:'Actividades'}, function(err2,da) {
      if(err2){setSyncStatus('Sin conexión','sync-err');if(cb)cb(err2);return;}
      actividades=(da.data||[]).filter(function(r){return r[3];}).map(function(r,i){
        return {rowIndex:i+2,ci:parseInt(r[0])||0,clienteNombre:r[1]||'',tipo:r[2]||'otro',desc:r[3]||'',fecha:r[4]||'',est:r[5]||'pendiente',urg:r[6]==='si'||r[6]===true,abog:r[7]||'Federico',monto:r[8]||'',notas:r[9]||''};
      });
      setSyncStatus('✓ Sincronizado','sync-ok');
      if(cb)cb(null);
    });
  });
}

function goTab(t) {
  var tabs=['dashboard','clientes','expedientes','actividades','vencimientos'];
  document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',tabs[i]===t);});
  document.querySelectorAll('.section').forEach(function(el){el.classList.remove('active');});
  document.getElementById('s-'+t).classList.add('active');
  if(t==='dashboard') renderDash();
  if(t==='clientes') renderClientes();
  if(t==='expedientes') renderExpedientes();
  if(t==='actividades') renderActividades();
  if(t==='vencimientos') renderVencimientos();
}

function cerrarOv(id){document.getElementById(id).classList.remove('open');editIdx=-1;}

// ── CLIENTES ─────────────────────────────────────
function abrirCliente(idx) {
  editIdx=idx; var c=idx>=0?clientes[idx]:{};
  document.getElementById('mc-h').textContent=idx>=0?'Editar cliente':'Nuevo cliente';
  ['id','nombre','dni','tel','email','expte','desc'].forEach(function(k){document.getElementById('mc-'+k).value=c[k]||'';});
  document.getElementById('mc-area').value=c.area||'civil';
  document.getElementById('mc-abog').value=c.abog||'Federico';
  document.getElementById('mc-estado').value=c.estado||'activo';
  document.getElementById('ov-cliente').classList.add('open');
  setTimeout(function(){document.getElementById('mc-nombre').focus();},80);
}

function guardarCliente() {
  var nombre=document.getElementById('mc-nombre').value.trim();
  if(!nombre){alert('Ingresá el nombre del cliente.');return;}
  var obj={id:document.getElementById('mc-id').value.trim(),nombre:nombre,dni:document.getElementById('mc-dni').value.trim(),tel:document.getElementById('mc-tel').value.trim(),email:document.getElementById('mc-email').value.trim(),area:document.getElementById('mc-area').value,expte:document.getElementById('mc-expte').value.trim(),desc:document.getElementById('mc-desc').value.trim(),abog:document.getElementById('mc-abog').value,estado:document.getElementById('mc-estado').value};
  var row=[obj.id,obj.nombre,obj.dni,obj.tel,obj.email,obj.area,obj.expte,obj.desc,obj.abog,obj.estado];
  var btn=document.getElementById('btn-gc');
  btn.disabled=true;btn.textContent='Guardando...';
  setSyncStatus('Guardando...','sync-loading');
  var params=editIdx>=0?{action:'update',sheet:'Clientes',rowIndex:clientes[editIdx].rowIndex,row:encodeURIComponent(JSON.stringify(row))}:{action:'append',sheet:'Clientes',row:encodeURIComponent(JSON.stringify(row))};
  api(params,function(err){
    btn.disabled=false;btn.textContent='Guardar cliente';
    if(err){alert('Error al guardar.');setSyncStatus('Error','sync-err');return;}
    cerrarOv('ov-cliente');
    cargarTodo(function(){renderClientes();renderDash();});
    toast('✓ Cliente guardado');
  });
}

function eliminarCliente(idx) {
  var c=clientes[idx];
  if(!confirm('¿Eliminar a "'+c.nombre+'"?')) return;
  setSyncStatus('Eliminando...','sync-loading');
  function borrarActs(done){
    var act=actividades.find(function(a){return a.ci===c.rowIndex;});
    if(!act){done();return;}
    api({action:'deleteRow',sheet:'Actividades',rowIndex:act.rowIndex},function(){
      cargarTodo(function(){borrarActs(done);});
    });
  }
  borrarActs(function(){
    api({action:'deleteRow',sheet:'Clientes',rowIndex:c.rowIndex},function(err){
      if(err){alert('Error al eliminar.');setSyncStatus('Error','sync-err');return;}
      cargarTodo(function(){renderClientes();renderDash();});
      toast('✓ Cliente eliminado');
    });
  });
}

function renderClientes() {
  var q=(document.getElementById('q-cliente').value||'').toLowerCase();
  var area=document.getElementById('q-area').value;
  var estado=document.getElementById('q-estado').value;
  var el=document.getElementById('lista-clientes');
  var lista=clientes.map(function(c,i){return Object.assign({},c,{i:i});}).filter(function(c){
    return(!area||c.area===area)&&(!estado||(c.estado||'activo')===estado)&&(!q||c.nombre.toLowerCase().includes(q)||(c.expte||'').toLowerCase().includes(q));
  });
  if(!lista.length){el.innerHTML='<div class="empty">No hay clientes.</div>';return;}
  el.innerHTML=lista.map(function(c){
    return '<div class="card"><div class="ch"><div>'
      +'<div class="ct">'+c.nombre+'</div>'
      +(c.id?'<div style="font-size:11px;color:#B4862A;font-weight:600;margin-top:1px">'+c.id+'</div>':'')
      +'<div class="cs">'+(c.expte?'Expte. '+c.expte+' &middot; ':'')+'<span class="badge b-'+c.area+'">'+cap(c.area)+'</span> <span class="badge b-'+(c.estado||'activo')+'">'+cap(c.estado||'activo')+'</span></div>'
      +'</div><div style="display:flex;gap:6px;flex-shrink:0">'
      +'<button class="btn" onclick="abrirCliente('+c.i+')">Editar</button>'
      +'<button class="btn red" onclick="eliminarCliente('+c.i+')">Eliminar</button>'
      +'</div></div>'
      +'<div class="meta">'+(c.tel?'<span>Tel: '+c.tel+'</span>':'')+(c.email?'<span>Email: '+c.email+'</span>':'')+'<span>A cargo: '+c.abog+'</span></div>'
      +(c.desc?'<div style="margin-top:8px;font-size:12px;color:#888;font-style:italic">'+c.desc+'</div>':'')
      +'<div class="acts"><button class="btn" onclick="goTab('actividades');setTimeout(function(){abrirActividad('+c.rowIndex+')},80)">+ Actividad</button></div>'
      +'</div>';
  }).join('');
}

// ── EXPEDIENTES ──────────────────────────────────
function toggleExpte(id){
  var body=document.getElementById('expte-body-'+id);
  var arrow=document.getElementById('expte-arrow-'+id);
  body.classList.toggle('open'); arrow.classList.toggle('open');
}

function renderExpedientes() {
  var q=(document.getElementById('q-expte').value||'').toLowerCase();
  var estado=document.getElementById('q-estado-expte').value;
  var el=document.getElementById('lista-expedientes');
  var lista=clientes.map(function(c,i){return Object.assign({},c,{i:i});}).filter(function(c){
    return c.expte&&c.expte.trim()!==''&&(!estado||(c.estado||'activo')===estado)&&(!q||c.expte.toLowerCase().includes(q)||c.nombre.toLowerCase().includes(q));
  });
  if(!lista.length){el.innerHTML='<div class="empty">No hay expedientes en este estado.</div>';return;}
  el.innerHTML=lista.map(function(c){
    var acts=actividades.filter(function(a){return a.ci===c.rowIndex;}).sort(function(a,b){return(a.fecha||'')>(b.fecha||'')?1:-1;});
    var pend=acts.filter(function(a){return a.est==='pendiente';}).length;
    var tl=acts.length?'<div class="timeline">'+acts.map(function(a){
      return '<div class="tl-item"><div class="tl-dot '+a.est+'"></div>'
        +'<div class="tl-fecha">'+fmt(a.fecha)+'</div>'
        +'<div class="tl-desc">'+a.desc+'</div>'
        +'<div class="tl-meta"><span class="badge b-'+a.est+'">'+cap(a.est)+'</span>'+(a.urg?'<span class="badge b-urgente">Urgente</span>':'')+'<span style="color:#bbb">'+(TL[a.tipo]||a.tipo)+'</span><span>'+a.abog+'</span>'+(a.monto?'<span>$'+Number(a.monto).toLocaleString('es-AR')+'</span>':'')+'</div>'+(a.notas?'<div class="tl-notas">'+a.notas+'</div>':'')+'</div>';
    }).join('')+'</div>':'<div style="font-size:13px;color:#bbb;text-align:center;padding:.5rem 0">Sin actividades registradas.</div>';
    return '<div class="expte-card">'
      +'<div class="expte-header" onclick="toggleExpte('+c.rowIndex+')">'
      +'<div style="flex:1;min-width:0">'
      +'<div class="expte-num">Expte. '+c.expte+'</div>'
      +'<div class="expte-nombre">'+c.nombre+(c.id?' <span style="font-size:11px;color:#B4862A;font-weight:600">('+c.id+')</span>':'')+'</div>'
      +'<div class="expte-meta"><span>'+acts.length+' actividad'+(acts.length!==1?'es':'')+'</span>'+(pend?'<span class="badge b-pendiente">'+pend+' pendiente'+(pend!==1?'s':'')+'</span>':'')+'<span class="badge b-'+(c.estado||'activo')+'">'+cap(c.estado||'activo')+'</span></div>'
      +'</div><div class="expte-toggle" id="expte-arrow-'+c.rowIndex+'">›</div>'
      +'</div>'
      +'<div class="expte-body" id="expte-body-'+c.rowIndex+'">'
      +'<div class="expte-datos">'+(c.tel?'<span>📞 '+c.tel+'</span>':'')+(c.email?'<span>✉ '+c.email+'</span>':'')+'<span>👤 '+c.abog+'</span><span class="badge b-'+c.area+'">'+cap(c.area)+'</span>'+(c.dni?'<span>DNI/CUIT: '+c.dni+'</span>':'')+'</div>'
      +(c.desc?'<div style="font-size:13px;color:#777;font-style:italic;margin-bottom:.8rem;padding:.6rem .8rem;background:rgba(180,134,42,0.06);border-radius:6px;border-left:3px solid #B4862A">'+c.desc+'</div>':'')
      +'<div class="divider">Historial de actividades</div>'+tl
      +'<div style="margin-top:1rem"><button class="btn pri" onclick="goTab('actividades');setTimeout(function(){abrirActividad('+c.rowIndex+')},80)">+ Nueva actividad</button></div>'
      +'</div></div>';
  }).join('');
}

// ── ACTIVIDADES ──────────────────────────────────
function abrirActividad(clienteRowIndex) {
  var sel=document.getElementById('ma-cli');
  sel.innerHTML=clientes.length?clientes.map(function(c){return '<option value="'+c.rowIndex+'">'+c.nombre+'</option>';}).join(''):'<option value="">— Sin clientes —</option>';
  if(clienteRowIndex) sel.value=clienteRowIndex;
  document.getElementById('ma-fecha').value=hoy();
  ['ma-desc','ma-monto','ma-notas'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('ma-est').value='pendiente';
  document.getElementById('ma-urg').value='no';
  document.getElementById('ov-actividad').classList.add('open');
}

function guardarActividad() {
  var desc=document.getElementById('ma-desc').value.trim();
  if(!desc){alert('Ingresá una descripción.');return;}
  if(!clientes.length){alert('Primero cargá un cliente.');return;}
  var ciRowIndex=parseInt(document.getElementById('ma-cli').value)||0;
  var cliente=clientes.find(function(c){return c.rowIndex===ciRowIndex;});
  var row=[ciRowIndex,cliente?cliente.nombre:'',document.getElementById('ma-tipo').value,desc,document.getElementById('ma-fecha').value,document.getElementById('ma-est').value,document.getElementById('ma-urg').value,document.getElementById('ma-abog').value,document.getElementById('ma-monto').value,document.getElementById('ma-notas').value.trim()];
  var btn=document.getElementById('btn-ga');
  btn.disabled=true;btn.textContent='Guardando...';
  setSyncStatus('Guardando...','sync-loading');
  api({action:'append',sheet:'Actividades',row:encodeURIComponent(JSON.stringify(row))},function(err){
    btn.disabled=false;btn.textContent='Guardar actividad';
    if(err){alert('Error al guardar.');setSyncStatus('Error','sync-err');return;}
    cerrarOv('ov-actividad');
    cargarTodo(function(){renderActividades();renderDash();});
    toast('✓ Actividad guardada');
  });
}

function avanzarEstado(idx) {
  var a=actividades[idx];
  var orden=['pendiente','en-curso','completado'];
  var nuevoEst=orden[(orden.indexOf(a.est)+1)%3];
  var row=[a.ci,a.clienteNombre,a.tipo,a.desc,a.fecha,nuevoEst,a.urg?'si':'no',a.abog,a.monto,a.notas];
  setSyncStatus('Guardando...','sync-loading');
  api({action:'update',sheet:'Actividades',rowIndex:a.rowIndex,row:encodeURIComponent(JSON.stringify(row))},function(err){
    if(err){alert('Error.');setSyncStatus('Error','sync-err');return;}
    cargarTodo(function(){renderActividades();renderDash();});
  });
}

function eliminarActividad(idx) {
  if(!confirm('¿Eliminar esta actividad?')) return;
  setSyncStatus('Eliminando...','sync-loading');
  api({action:'deleteRow',sheet:'Actividades',rowIndex:actividades[idx].rowIndex},function(err){
    if(err){alert('Error.');setSyncStatus('Error','sync-err');return;}
    cargarTodo(function(){renderActividades();renderDash();});
    toast('✓ Actividad eliminada');
  });
}

function renderActividades() {
  var tipo=document.getElementById('q-tipo').value,est=document.getElementById('q-est').value,abog=document.getElementById('q-abog').value;
  var el=document.getElementById('lista-actividades');
  var lista=actividades.map(function(a,i){return Object.assign({},a,{i:i});}).filter(function(a){
    return(!tipo||a.tipo===tipo)&&(!est||a.est===est)&&(!abog||a.abog===abog);
  }).sort(function(a,b){return(a.fecha||'')>(b.fecha||'')?1:-1;});
  if(!lista.length){el.innerHTML='<div class="empty">No hay actividades.</div>';return;}
  el.innerHTML=lista.map(function(a){
    var cn=clientes.find(function(c){return c.rowIndex===a.ci;});
    return '<div class="card"><div class="ch"><div>'
      +'<div class="ct">'+a.desc+'</div>'
      +'<div class="cs"><span class="badge b-'+a.est+'">'+cap(a.est)+'</span>'+(a.urg?'<span class="badge b-urgente">Urgente</span>':'')+'<span style="color:#ccc">'+(TL[a.tipo]||a.tipo)+'</span></div>'
      +'</div><div style="display:flex;gap:6px;flex-shrink:0">'
      +'<button class="btn" onclick="avanzarEstado('+a.i+')" title="Avanzar estado">→</button>'
      +'<button class="btn red" onclick="eliminarActividad('+a.i+')">✕</button>'
      +'</div></div>'
      +'<div class="meta"><span>'+(cn?cn.nombre:a.clienteNombre||'—')+'</span><span>'+fmt(a.fecha)+'</span><span>'+a.abog+'</span>'+(a.monto?'<span>$'+Number(a.monto).toLocaleString('es-AR')+'</span>':'')+'</div>'
      +(a.notas?'<div style="margin-top:6px;font-size:12px;color:#888;font-style:italic">'+a.notas+'</div>':'')
      +'</div>';
  }).join('');
}

function renderVencimientos() {
  var d=parseInt(document.getElementById('q-dias').value),el=document.getElementById('lista-venc');
  var lista=actividades.filter(function(a){return a.fecha&&a.est!=='completado';});
  if(d>0) lista=lista.filter(function(a){var x=diasA(a.fecha);return x>=-3&&x<=d;});
  lista.sort(function(a,b){return a.fecha>b.fecha?1:-1;});
  if(!lista.length){el.innerHTML='<div class="empty">No hay vencimientos.</div>';return;}
  el.innerHTML=lista.map(function(a){
    var dr=diasA(a.fecha),cn=clientes.find(function(c){return c.rowIndex===a.ci;}),alerta,col;
    if(dr<0){col='#A32D2D';alerta='Vencido hace '+Math.abs(dr)+' día'+(Math.abs(dr)!==1?'s':'');}
    else if(dr===0){col='#A32D2D';alerta='Vence HOY';}
    else if(dr<=3){col='#854F0B';alerta='En '+dr+' día'+(dr!==1?'s':'');}
    else{col='#777';alerta=fmt(a.fecha);}
    return '<div class="card"><div class="ch">'
      +'<div><div class="ct">'+a.desc+'</div><div class="cs">'+(cn?cn.nombre:a.clienteNombre||'—')+' &middot; '+(TL[a.tipo]||a.tipo)+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0"><span style="font-size:12px;font-weight:600;color:'+col+'">'+alerta+'</span><br><span class="badge b-'+a.est+'" style="margin-top:4px">'+cap(a.est)+'</span></div>'
      +'</div><div class="meta"><span>'+a.abog+'</span></div></div>';
  }).join('');
}

function renderDash() {
  var pend=actividades.filter(function(a){return a.est==='pendiente';}).length;
  var v7=actividades.filter(function(a){return a.fecha&&a.est!=='completado'&&diasA(a.fecha)>=0&&diasA(a.fecha)<=7;}).length;
  var hon=actividades.filter(function(a){return a.tipo==='honorario'&&a.monto;}).reduce(function(s,a){return s+Number(a.monto);},0);
  var exptes=clientes.filter(function(c){return c.expte&&c.expte.trim()!=='';}).length;
  document.getElementById('stats-grid').innerHTML=
    '<div class="stat"><div class="stat-n">'+clientes.length+'</div><div class="stat-l">Clientes</div></div>'
    +'<div class="stat"><div class="stat-n">'+exptes+'</div><div class="stat-l">Expedientes</div></div>'
    +'<div class="stat"><div class="stat-n">'+pend+'</div><div class="stat-l">Pendientes</div></div>'
    +'<div class="stat"><div class="stat-n">'+v7+'</div><div class="stat-l">Vencen en 7 días</div></div>'
    +'<div class="stat"><div class="stat-n">$'+Math.round(hon).toLocaleString('es-AR')+'</div><div class="stat-l">Honorarios</div></div>';
  var pV=actividades.filter(function(a){return a.fecha&&a.est!=='completado';}).sort(function(a,b){return a.fecha>b.fecha?1:-1;}).slice(0,3);
  document.getElementById('d-venc').innerHTML=pV.length?pV.map(function(a){
    var cn=clientes.find(function(c){return c.rowIndex===a.ci;}),dr=diasA(a.fecha),col=dr<=0?'#A32D2D':dr<=3?'#854F0B':'#777';
    return '<div class="card" style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div class="ct" style="font-size:13px">'+a.desc+'</div><div class="cs">'+(cn?cn.nombre:a.clienteNombre||'—')+'</div></div>'
      +'<span style="font-size:12px;font-weight:600;color:'+col+';flex-shrink:0">'+fmt(a.fecha)+'</span></div>';
  }).join(''):'<div class="empty">Sin vencimientos próximos.</div>';
  var pL=actividades.filter(function(a){return a.est==='pendiente';}).slice(0,3);
  document.getElementById('d-pend').innerHTML=pL.length?pL.map(function(a){
    var cn=clientes.find(function(c){return c.rowIndex===a.ci;});
    return '<div class="card" style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div class="ct" style="font-size:13px">'+a.desc+'</div><div class="cs">'+(cn?cn.nombre:a.clienteNombre||'—')+' &middot; '+a.abog+'</div></div>'
      +(a.urg?'<span class="badge b-urgente">Urgente</span>':'')+'</div>';
  }).join(''):'<div class="empty">No hay pendientes.</div>';
}

cargarTodo(function(err){
  if(!err){renderDash();renderClientes();}
});
</script>
</body>
</html>
